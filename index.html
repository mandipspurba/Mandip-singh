<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandip Singh | Private Wealth Advisory</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0b0b0c;
color:#e5e5e5;
font-family:'Inter',sans-serif;
line-height:1.8;
overflow-x:hidden;
}

/* GOLD VARIABLES */
:root{
--gold:#c6a75e;
--gold-soft:#9f7f3f;
--glass:rgba(255,255,255,0.03);
}

/* SECTION */
section{
padding:130px 20px;
max-width:1200px;
margin:auto;
text-align:center;
position:relative;
}

h1,h2{
font-family:'Playfair Display',serif;
letter-spacing:1px;
}

h1{font-size:48px;margin-bottom:20px;}
h2{font-size:34px;color:var(--gold);margin-bottom:70px;}

.subtitle{
color:#aaa;
font-size:18px;
letter-spacing:2px;
text-transform:uppercase;
}

/* GOLD DIVIDER WITH SHIMMER */
.divider{
width:80px;
height:2px;
margin:40px auto;
background:linear-gradient(
90deg,
transparent,
rgba(198,167,94,0.4),
var(--gold),
rgba(198,167,94,0.4),
transparent
);
background-size:200% auto;
animation:shimmer 6s linear infinite;
}

@keyframes shimmer{
0%{background-position:-200% center;}
100%{background-position:200% center;}
}

/* PROFILE */
.profile img{
width:190px;
border-radius:50%;
border:2px solid var(--gold);
box-shadow:0 0 40px rgba(198,167,94,0.25);
margin-bottom:40px;
}

/* BUTTON */
.btn{
display:inline-block;
padding:16px 40px;
border:1px solid var(--gold);
color:var(--gold);
text-decoration:none;
letter-spacing:2px;
font-size:14px;
transition:0.4s;
margin-top:40px;
position:relative;
overflow:hidden;
}

.btn:before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(198,167,94,0.4),
transparent
);
transition:0.6s;
}

.btn:hover:before{
left:100%;
}

.btn:hover{
background:var(--gold);
color:#0b0b0c;
}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:50px;
}

.card{
background:var(--glass);
padding:50px 30px;
border:1px solid rgba(198,167,94,0.2);
transition:0.4s;
}

.card:hover{
border:1px solid var(--gold);
transform:translateY(-8px);
}

/* COUNTERS SECTION */
.counters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:60px;
margin-top:40px;
}

.counter-number{
font-size:42px;
font-family:'Playfair Display',serif;
color:var(--gold);
}

.counter-label{
letter-spacing:2px;
font-size:14px;
color:#aaa;
margin-top:10px;
}

/* LOGO FLOAT */
.logo-float{
position:fixed;
top:40px;
right:40px;
width:75px;
height:75px;
border-radius:50%;
border:2px solid var(--gold);
overflow:hidden;
cursor:pointer;
z-index:1000;
transition:0.4s;
}

.logo-float:hover{
box-shadow:0 0 25px rgba(198,167,94,0.4);
}

/* VIDEO MODAL */
.video-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:2000;
}

.video-container{
width:85%;
max-width:1000px;
border:1px solid var(--gold);
}

.close-video{
position:absolute;
top:40px;
right:50px;
font-size:38px;
color:var(--gold);
cursor:pointer;
}
</style>
</head>

<body>

<img src="https://i.postimg.cc/tJPHQKpX/NAOL.jpg" class="logo-float" onclick="openVideo()">

<div class="video-modal" id="videoModal">
<span class="close-video" onclick="closeVideo()">&times;</span>
<div class="video-container">
<video id="promoVideo" width="100%" controls>
<source src="https://res.cloudinary.com/dtnmuheqj/video/upload/v1773959627/New%20Art%20of%20Living.mp4" type="video/mp4">
</video>
</div>
</div>

<section>
<div class="profile">
<img src="https://i.postimg.cc/KjVq8kLS/mandip.jpg">
<h1>Mandip Singh</h1>
<p class="subtitle">Private Wealth & Insurance Advisory</p>
<div class="divider"></div>
<a href="#" class="btn">REQUEST PRIVATE CONSULTATION</a>
</div>
</section>

<!-- COUNTERS -->
<section>
<h2>Trusted By Clients Nationwide</h2>
<div class="divider"></div>
<div class="counters">
<div>
<div class="counter-number" data-target="250">0</div>
<div class="counter-label">CLIENTS SERVED</div>
</div>
<div>
<div class="counter-number" data-target="15">0</div>
<div class="counter-label">YEARS EXPERIENCE</div>
</div>
<div>
<div class="counter-number" data-target="98">0</div>
<div class="counter-label">CLIENT RETENTION %</div>
</div>
</div>
</section>

<script>
/* Video */
function openVideo(){
document.getElementById('videoModal').style.display='flex';
}
function closeVideo(){
const modal=document.getElementById('videoModal');
const video=document.getElementById('promoVideo');
modal.style.display='none';
video.pause();
video.currentTime=0;
}

/* COUNTER ANIMATION */
const counters=document.querySelectorAll('.counter-number');
const speed=200;

const animateCounters=()=>{
counters.forEach(counter=>{
const target=+counter.getAttribute('data-target');
const count=+counter.innerText;
const increment=target/speed;

if(count<target){
counter.innerText=Math.ceil(count+increment);
setTimeout(animateCounters,20);
}else{
counter.innerText=target;
}
});
};

window.addEventListener('scroll',()=>{
const sectionTop=document.querySelector('.counters').getBoundingClientRect().top;
if(sectionTop<window.innerHeight-100){
animateCounters();
}
});
</script>

</body>
</html>
